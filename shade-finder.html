// =============================================
// HELPERS
// =============================================
function seededRand(seed){ let x = Math.sin(seed)*10000; return x-Math.floor(x); }
function comingSoon(label){ alert(label+' — tersedia di halaman lengkap aplikasi (tidak disertakan dalam file shade finder ini).'); }
function viewProduct(id){
  const p = PRODUCTS.find(x=>x.id===id); if(!p) return;
  const shadeNames = p.shades.map(s=>s.name).join(', ');
  alert(`${p.brand} — ${p.name}\n\n${p.desc}\n\nShades: ${shadeNames}`);
}

// =============================================
// SHADE FINDER STATE
// =============================================
let selectedSfCategory = 'Base';
let selectedTone = 'Fair';
let selectedUndertone = 'Warm';

// =============================================
// SHADE FINDER
// =============================================
function renderSfCats(){
  const cats=['Base','Face','Eye','Lip','Brow'];
  document.getElementById('sfCatRow').innerHTML = cats.map(c=>
    `<button class="sf-cat-btn ${c===selectedSfCategory?'active':''}" onclick="selectSfCat(this,'${c}')">${c}</button>`).join('');
}
function selectSfCat(btn,c){
  selectedSfCategory=c;
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('shadeFinderResults').innerHTML='';
}
function selectTone(btn,t){ selectedTone=t; btn.parentElement.querySelectorAll('.shade-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function selectUndertone(btn,t){ selectedUndertone=t; btn.parentElement.querySelectorAll('.shade-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
function runShadeFinder(){
  const el=document.getElementById('shadeFinderResults');
  // Filter by category — results berbeda sesuai kategori
  let pool = PRODUCTS.filter(p=>p.category===selectedSfCategory);
  if(pool.length===0){ el.innerHTML=`<div class="empty-state">Belum ada produk untuk kategori ${selectedSfCategory}.</div>`; return; }
  // Add a deterministic ordering based on tone+undertone+category
  const seedSum = (selectedSfCategory+selectedTone+selectedUndertone).split('').reduce((a,c)=>a+c.charCodeAt(0),0);
  pool = pool.slice().sort((a,b)=>seededRand(seedSum+a.id.length)-seededRand(seedSum+b.id.length));
  el.innerHTML = `<div class="eyebrow" style="margin-bottom:14px">Top ${selectedSfCategory} for ${selectedTone} · ${selectedUndertone}</div>
    <div class="results-grid">${pool.map(renderResultCard).join('')}</div>`;
}

// =============================================
// SEARCH RESULT CARD
// =============================================
function renderResultCard(p){
  const shadesHtml = p.shades.slice(0,5).map(s=>`<div class="sh-dot" style="background:${s.color}"></div>`).join('');
  return `<div class="result-card" onclick="viewProduct('${p.id}')">
    <div class="img-wrap"><img src="${p.img}" alt="${p.name}" loading="lazy"/></div>
    <div class="card-body">
      <div class="brand-tag">${p.brand}</div>
      <h3>${p.name}</h3>
      <div style="font-size:12.5px;color:var(--soft);line-height:1.5;margin-top:4px">${p.desc.substring(0,90)}...</div>
      <div class="shade-row">${shadesHtml}</div>
    </div></div>`;
}

// =============================================
// INIT
// =============================================
async function init(){
  const sbProducts = await sbFetchProducts();
  if(sbProducts && sbProducts.length > 0) PRODUCTS = sbProducts;
  renderSfCats();
}
init();
